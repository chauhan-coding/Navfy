<svg width="480" height="380" viewBox="0 0 480 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="480" height="380" rx="20" fill="#f0f9ff"/>
  <!-- Building outline -->
  <rect x="60" y="60" width="360" height="260" rx="12" fill="#e2e8f0"/>
  <rect x="60" y="60" width="360" height="260" rx="12" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Glass facade -->
  <rect x="80" y="80" width="320" height="220" rx="8" fill="#bfdbfe"/>
  <!-- Building windows grid -->
  <g fill="white" opacity="0.55">
    <rect x="100" y="100" width="40" height="30" rx="4"/>
    <rect x="155" y="100" width="40" height="30" rx="4"/>
    <rect x="210" y="100" width="40" height="30" rx="4"/>
    <rect x="265" y="100" width="40" height="30" rx="4"/>
    <rect x="320" y="100" width="40" height="30" rx="4"/>
    <rect x="100" y="145" width="40" height="30" rx="4"/>
    <rect x="155" y="145" width="40" height="30" rx="4"/>
    <rect x="210" y="145" width="40" height="30" rx="4"/>
    <rect x="265" y="145" width="40" height="30" rx="4"/>
    <rect x="320" y="145" width="40" height="30" rx="4"/>
    <rect x="100" y="190" width="40" height="30" rx="4"/>
    <rect x="155" y="190" width="40" height="30" rx="4"/>
    <rect x="210" y="190" width="40" height="30" rx="4"/>
    <rect x="265" y="190" width="40" height="30" rx="4"/>
    <rect x="320" y="190" width="40" height="30" rx="4"/>
  </g>
  <!-- Entrance -->
  <rect x="200" y="255" width="80" height="45" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <rect x="220" y="255" width="18" height="45" rx="3" fill="#fff" opacity="0.2"/>
  <rect x="242" y="255" width="18" height="45" rx="3" fill="#fff" opacity="0.2"/>
  <!-- Sky reflect shine -->
  <path d="M 80 80 Q 200 95 320 80 L 400 100 L 80 120 Z" fill="white" opacity="0.06" rx="8"/>
  <!-- Ground / Steps -->
  <rect x="40" y="320" width="400" height="14" rx="7" fill="#94a3b8" opacity="0.4"/>
  <rect x="60" y="312" width="360" height="10" rx="5" fill="#cbd5e1" opacity="0.5"/>
  <!-- Trees left -->
  <circle cx="40" cy="280" r="30" fill="#16a34a" opacity="0.7"/>
  <rect x="36" y="305" width="8" height="20" rx="4" fill="#7c3a0a" opacity="0.5"/>
  <!-- Trees right -->
  <circle cx="440" cy="280" r="30" fill="#16a34a" opacity="0.7"/>
  <rect x="436" y="305" width="8" height="20" rx="4" fill="#7c3a0a" opacity="0.5"/>
  <!-- Logo mark on building -->
  <circle cx="240" cy="52" rx="16" ry="16" fill="#0d9488"/>
  <path d="M 232 52 Q 240 44 248 52 Q 240 60 232 52 Z" fill="white"/>
  <!-- Sky / cloud hints -->
  <ellipse cx="380" cy="30" rx="40" ry="14" fill="white" opacity="0.5"/>
  <ellipse cx="410" cy="28" rx="28" ry="12" fill="white" opacity="0.4"/>
  <ellipse cx="80" cy="35" rx="34" ry="12" fill="white" opacity="0.45"/>
</svg>
