<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue explorer medal -->
  <defs>
    <radialGradient id="explorerShield" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="explorerRibbon" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
  </defs>
  <!-- Ribbon / top part -->
  <rect x="56" y="12" width="22" height="48" rx="11" fill="url(#explorerRibbon)"/>
  <rect x="82" y="12" width="22" height="48" rx="11" fill="url(#explorerRibbon)"/>
  <rect x="56" y="12" width="48" height="14" rx="7" fill="#93c5fd"/>
  <!-- Medal circle -->
  <circle cx="80" cy="108" r="50" fill="url(#explorerShield)"/>
  <circle cx="80" cy="108" r="50" fill="none" stroke="#93c5fd" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="80" cy="108" r="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Medal number 1 -->
  <text x="80" y="120" font-size="44" font-weight="800" text-anchor="middle" fill="white" font-family="Arial, sans-serif" opacity="0.95">1</text>
  <!-- Stars on medal -->
  <polygon points="46,82 49,90 57,90 51,95 53,103 46,98 39,103 41,95 35,90 43,90" fill="rgba(255,255,255,0.5)" transform="scale(0.5) translate(46,60)"/>
  <polygon points="114,82 117,90 125,90 119,95 121,103 114,98 107,103 109,95 103,90 111,90" fill="rgba(255,255,255,0.5)" transform="scale(0.5) translate(-14,60)"/>
  <!-- Shine -->
  <ellipse cx="66" cy="94" rx="14" ry="10" fill="white" opacity="0.15"/>
</svg>
