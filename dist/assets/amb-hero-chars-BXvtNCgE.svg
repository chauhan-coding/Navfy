<svg width="540" height="440" viewBox="0 0 540 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow blobs -->
  <ellipse cx="360" cy="240" rx="130" ry="130" fill="rgba(20,184,166,0.18)"/>
  <ellipse cx="180" cy="280" rx="90" ry="90" fill="rgba(103,232,249,0.12)"/>

  <!-- Character Left: Student with laptop -->
  <g transform="translate(60, 60)">
    <!-- Body -->
    <ellipse cx="100" cy="340" rx="55" ry="22" fill="rgba(0,0,0,0.18)"/>
    <!-- Legs -->
    <rect x="83" y="280" width="14" height="62" rx="7" fill="#1e3a5f"/>
    <rect x="103" y="280" width="14" height="62" rx="7" fill="#1e3a5f"/>
    <!-- Shoes -->
    <ellipse cx="90" cy="342" rx="12" ry="6" fill="#0a1929"/>
    <ellipse cx="110" cy="342" rx="12" ry="6" fill="#0a1929"/>
    <!-- Torso -->
    <rect x="72" y="190" width="56" height="95" rx="18" fill="#00bfa5"/>
    <!-- Collar/Shirt detail -->
    <path d="M 92 190 L 100 210 L 108 190" fill="#fff" opacity="0.7"/>
    <!-- Left arm -->
    <path d="M 72 210 Q 45 225 40 245 Q 38 260 52 268" stroke="#f8c77a" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Right arm holding laptop -->
    <path d="M 128 210 Q 150 225 160 245 Q 168 260 158 272" stroke="#f8c77a" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Laptop -->
    <rect x="130" y="255" width="62" height="42" rx="6" fill="#1e293b"/>
    <rect x="133" y="258" width="56" height="36" rx="4" fill="#0d9488"/>
    <rect x="120" y="297" width="82" height="7" rx="4" fill="#334155"/>
    <!-- Code lines on screen -->
    <rect x="138" y="266" width="30" height="3" rx="1.5" fill="#67e8f9" opacity="0.8"/>
    <rect x="138" y="273" width="22" height="3" rx="1.5" fill="#a5f3fc" opacity="0.6"/>
    <rect x="138" y="280" width="36" height="3" rx="1.5" fill="#67e8f9" opacity="0.5"/>
    <!-- Neck -->
    <rect x="91" y="165" width="18" height="28" rx="9" fill="#f8c77a"/>
    <!-- Head -->
    <ellipse cx="100" cy="150" rx="36" ry="38" fill="#f8c77a"/>
    <!-- Eyes -->
    <ellipse cx="87" cy="145" rx="6" ry="7" fill="white"/>
    <ellipse cx="113" cy="145" rx="6" ry="7" fill="white"/>
    <ellipse cx="88" cy="146" rx="4" ry="4.5" fill="#1e293b"/>
    <ellipse cx="114" cy="146" rx="4" ry="4.5" fill="#1e293b"/>
    <ellipse cx="89" cy="145" rx="1.5" ry="1.5" fill="white"/>
    <ellipse cx="115" cy="145" rx="1.5" ry="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M 82 137 Q 88 133 94 137" stroke="#5c3d1a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 106 137 Q 112 133 118 137" stroke="#5c3d1a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Smile -->
    <path d="M 89 162 Q 100 170 111 162" stroke="#c0622a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Nose -->
    <ellipse cx="100" cy="156" rx="3" ry="2" fill="#e8a860" opacity="0.5"/>
    <!-- Hair -->
    <ellipse cx="100" cy="118" rx="36" ry="20" fill="#1a0a00"/>
    <ellipse cx="68" cy="138" rx="10" ry="16" fill="#1a0a00"/>
    <ellipse cx="132" cy="138" rx="10" ry="16" fill="#1a0a00"/>
    <!-- Glasses -->
    <rect x="79" y="139" width="18" height="14" rx="7" fill="none" stroke="#0a1929" stroke-width="2.5"/>
    <rect x="103" y="139" width="18" height="14" rx="7" fill="none" stroke="#0a1929" stroke-width="2.5"/>
    <line x1="97" y1="146" x2="103" y2="146" stroke="#0a1929" stroke-width="2"/>
    <line x1="69" y1="146" x2="79" y2="146" stroke="#0a1929" stroke-width="2"/>
    <line x1="121" y1="146" x2="131" y2="146" stroke="#0a1929" stroke-width="2"/>
    <!-- Backpack strap -->
    <path d="M 72 200 Q 60 235 62 270" stroke="#f97316" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Character Right: Student with globe -->
  <g transform="translate(270, 30)">
    <!-- Body shadow -->
    <ellipse cx="108" cy="375" rx="58" ry="22" fill="rgba(0,0,0,0.18)"/>
    <!-- Legs -->
    <rect x="90" y="305" width="15" height="72" rx="7.5" fill="#1e3a5f"/>
    <rect x="113" y="305" width="15" height="72" rx="7.5" fill="#1e3a5f"/>
    <!-- Pants cuff -->
    <rect x="87" y="368" width="21" height="10" rx="5" fill="#152234"/>
    <rect x="110" y="368" width="21" height="10" rx="5" fill="#152234"/>
    <!-- Sneakers -->
    <ellipse cx="97" cy="377" rx="14" ry="7" fill="#f1f5f9"/>
    <ellipse cx="120" cy="377" rx="14" ry="7" fill="#f1f5f9"/>
    <!-- Torso shirt -->
    <rect x="78" y="210" width="60" height="100" rx="20" fill="#f97316"/>
    <!-- Shirt stripes -->
    <rect x="78" y="240" width="60" height="5" rx="2.5" fill="#fff" opacity="0.2"/>
    <rect x="78" y="260" width="60" height="5" rx="2.5" fill="#fff" opacity="0.2"/>
    <!-- Left arm down -->
    <path d="M 78 225 Q 56 250 50 278" stroke="#f5c28a" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Right arm holding globe -->
    <path d="M 138 220 Q 162 240 170 262 Q 180 285 168 298" stroke="#f5c28a" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Globe -->
    <circle cx="186" cy="316" r="38" fill="#1d4ed8"/>
    <circle cx="186" cy="316" r="38" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
    <!-- Globe land masses -->
    <ellipse cx="178" cy="306" rx="14" ry="10" fill="#16a34a" opacity="0.85"/>
    <ellipse cx="196" cy="320" rx="10" ry="8" fill="#16a34a" opacity="0.75"/>
    <ellipse cx="174" cy="326" rx="8" ry="6" fill="#16a34a" opacity="0.7"/>
    <!-- Globe equator / longitude lines -->
    <ellipse cx="186" cy="316" rx="38" ry="15" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.45"/>
    <line x1="186" y1="278" x2="186" y2="354" stroke="#93c5fd" stroke-width="1" opacity="0.45"/>
    <!-- Shine on globe -->
    <ellipse cx="172" cy="300" rx="10" ry="8" fill="white" opacity="0.12"/>
    <!-- Neck -->
    <rect x="99" y="185" width="18" height="28" rx="9" fill="#f5c28a"/>
    <!-- Head -->
    <ellipse cx="108" cy="168" rx="38" ry="40" fill="#f5c28a"/>
    <!-- Cheeks blush -->
    <ellipse cx="90" cy="178" rx="8" ry="5" fill="#f59e0b" opacity="0.25"/>
    <ellipse cx="126" cy="178" rx="8" ry="5" fill="#f59e0b" opacity="0.25"/>
    <!-- Eyes -->
    <ellipse cx="95" cy="162" rx="7" ry="8" fill="white"/>
    <ellipse cx="121" cy="162" rx="7" ry="8" fill="white"/>
    <ellipse cx="96" cy="163" rx="4.5" ry="5" fill="#1e293b"/>
    <ellipse cx="122" cy="163" rx="4.5" ry="5" fill="#1e293b"/>
    <ellipse cx="97" cy="162" rx="1.5" ry="1.5" fill="white"/>
    <ellipse cx="123" cy="162" rx="1.5" ry="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M 88 151 Q 95 146 102 151" stroke="#7c3a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 114 151 Q 121 146 128 151" stroke="#7c3a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Smile -->
    <path d="M 96 180 Q 108 192 120 180" stroke="#c0622a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Hair -->
    <ellipse cx="108" cy="132" rx="38" ry="22" fill="#0f172a"/>
    <ellipse cx="74" cy="154" rx="12" ry="18" fill="#0f172a"/>
    <ellipse cx="142" cy="154" rx="12" ry="18" fill="#0f172a"/>
    <ellipse cx="108" cy="120" rx="30" ry="12" fill="#0f172a"/>
    <!-- Ear -->
    <ellipse cx="70" cy="168" rx="7" ry="10" fill="#f5c28a"/>
    <ellipse cx="146" cy="168" rx="7" ry="10" fill="#f5c28a"/>
  </g>

  <!-- Floating stars/sparkles -->
  <g opacity="0.7">
    <polygon points="45,90 49,103 62,103 52,111 56,124 45,116 34,124 38,111 28,103 41,103" fill="#fbbf24" transform="scale(0.45) translate(-10,120)"/>
    <polygon points="500,60 503,69 513,69 505,75 508,84 500,78 492,84 495,75 487,69 497,69" fill="#fbbf24" transform="scale(0.5) translate(-250, 0)"/>
    <circle cx="28" cy="300" r="5" fill="#67e8f9" opacity="0.6"/>
    <circle cx="510" cy="180" r="4" fill="#a78bfa" opacity="0.5"/>
    <circle cx="460" cy="380" r="6" fill="#34d399" opacity="0.45"/>
  </g>
</svg>
